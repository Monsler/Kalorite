name: macOS build

on:
  push:
    branches: [master, cpp-version]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.os }}

    env:
      # LuaJIT (built from the submodule) needs a deployment target on macOS.
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: brew install cmake ninja create-dmg

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: mac
          target: desktop
          modules: qtmultimedia
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOSX_DEPLOYMENT_TARGET }}

      - name: Build
        run: cmake --build build --config Release

      # ---------------------------------------------------------------------
      # Assemble a .app bundle. The CMake target is a plain executable, so we
      # build the bundle layout by hand, generate an .icns from the PNG, then
      # let macdeployqt pull in the Qt frameworks & plugins and emit a DMG.
      # ---------------------------------------------------------------------
      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble app bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          APP="Kalorite.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp build/kalorite "$APP/Contents/MacOS/kalorite"
          chmod +x "$APP/Contents/MacOS/kalorite"

          # PNG -> multi-resolution .icns
          ICONSET="kalorite.iconset"
          SRC="data/io.github.monsler.Kalorite.png"
          rm -rf "$ICONSET"; mkdir "$ICONSET"
          for s in 16 32 64 128 256 512; do
            sips -z $s $s        "$SRC" --out "$ICONSET/icon_${s}x${s}.png"      >/dev/null
            sips -z $((s*2)) $((s*2)) "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/kalorite.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Kalorite</string>
            <key>CFBundleDisplayName</key><string>Kalorite</string>
            <key>CFBundleExecutable</key><string>kalorite</string>
            <key>CFBundleIdentifier</key><string>io.github.monsler.Kalorite</string>
            <key>CFBundleIconFile</key><string>kalorite</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>${MACOSX_DEPLOYMENT_TARGET}</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Bundle Qt frameworks (macdeployqt)
        run: "$QT_ROOT_DIR/bin/macdeployqt Kalorite.app -verbose=1"

      # ---------------------------------------------------------------------
      # Launch smoke test. On a real Mac the app failed with "Kalorite can't be
      # opened" — usually a missing/unresolved dynamic library or a broken app
      # bundle that only surfaces at launch, never at build time. Run the fully
      # deployed bundle headlessly (Qt's offscreen platform) so any dyld / Qt
      # plugin loading failure fails the CI here instead of on a user's machine.
      # ---------------------------------------------------------------------
      - name: Launch smoke test
        run: |
          set -uo pipefail
          BIN="Kalorite.app/Contents/MacOS/kalorite"

          # Sanity-check the linker can resolve every dependency of the binary
          # and of every bundled framework. An "unresolved" line here is exactly
          # the kind of breakage that makes the app refuse to open.
          echo "== otool -L =="
          otool -L "$BIN"
          if otool -L "$BIN" | grep -q "@rpath.*not found"; then
            echo "::error::Unresolved @rpath dependency in the main binary"
            exit 1
          fi

          # Actually start the app headlessly and give it a moment to initialise
          # the GUI. If it dyld-crashes on launch it exits non-zero immediately.
          export QT_QPA_PLATFORM=offscreen
          "$BIN" &
          APP_PID=$!
          sleep 10
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App launched and stayed alive — OK"
            kill "$APP_PID" 2>/dev/null || true
            wait "$APP_PID" 2>/dev/null || true
          else
            wait "$APP_PID"
            STATUS=$?
            echo "::error::App exited on launch with status $STATUS"
            exit 1
          fi

      - name: Create DMG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DMG="Kalorite-${VERSION}-${{ matrix.arch }}.dmg"
          create-dmg \
            --volname "Kalorite ${VERSION}" \
            --icon "Kalorite.app" 150 190 \
            --app-drop-link 450 190 \
            --window-size 600 400 \
            --hide-extension "Kalorite.app" \
            "$DMG" "Kalorite.app" \
          || hdiutil create -volname "Kalorite ${VERSION}" -srcfolder "Kalorite.app" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalorite-${{ matrix.arch }}
          path: ${{ env.DMG }}

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
